<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infraestructura Docker - Galería Multimedia</title>
    <style>
        :root {
            --primary: #4facfe;
            --secondary: #00f2fe;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #fff;
            margin: 0;
            padding: 2rem;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 4rem;
        }
        h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }
        .badge {
            display: inline-block;
            padding: 0.5rem 1.5rem;
            background: rgba(79, 172, 254, 0.1);
            border: 1px solid var(--primary);
            border-radius: 50px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        /* Video Section */
        .featured-video {
            width: 100%;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-bottom: 4rem;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        video {
            width: 100%;
            display: block;
        }

        /* Gallery Grid */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }
        .card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
        }
        .card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px -10px rgba(79, 172, 254, 0.2);
        }
        .card img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .card:hover img {
            transform: scale(1.05);
        }
        .card-info {
            padding: 1.5rem;
            background: linear-gradient(to top, rgba(15, 23, 42, 0.9), transparent);
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
        }
        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 0;
        }

        footer {
            margin-top: 5rem;
            text-align: center;
            opacity: 0.6;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            body { padding: 1rem; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="badge">Infraestructura Balanceada</div>
            <h1>Galería Multimedia</h1>
            <p>Contenido compartido servido desde múltiples servidores backend.</p>
        </header>

        <section class="featured-video">
            <video controls poster="imagenes/about_time.jpg">
                <source src="imagenes/Project Hail Mary  Big Game Spot.mp4" type="video/mp4">
                Tu navegador no soporta el elemento de video.
            </video>
        </section>

        <div class="gallery">
            <div class="card">
                <img src="imagenes/about_time.jpg" alt="About Time">
                <div class="card-info">
                    <p class="card-title">About Time</p>
                </div>
            </div>
            <div class="card">
                <img src="imagenes/dune2.jpg" alt="Dune 2">
                <div class="card-info">
                    <p class="card-title">Dune: Part Two</p>
                </div>
            </div>
            <div class="card">
                <img src="imagenes/interstellar.jpg" alt="Interstellar">
                <div class="card-info">
                    <p class="card-title">Interstellar</p>
                </div>
            </div>
            <div class="card">
                <img src="imagenes/the_hunt.jpg" alt="The Hunt">
                <div class="card-info">
                    <p class="card-title">The Hunt</p>
                </div>
            </div>
        </div>

        <footer>
            <p>Servido por Docker & Nginx Load Balancer</p>
        </footer>
    </div>
</body>
</html>
